<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Recipe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><a href="index.html">Home</a><a href="traditional.html">Traditional</a><a href="vegan.html">Vegan</a><a href="dietary.html">Dietary</a><a href="add.html">Add Recipe</a><a href="save.html">Saved</a></nav>
    <header><h1>Share a Recipe</h1><p>Add your creation to the gallery.</p></header>
    <div class="container">
        <form onsubmit="handleAddRecipe(event)">
            <label>Recipe Name</label>
            <input type="text" id="title" placeholder="e.g. Grandma's Pasta" required>
            <label>Category</label>
            <select id="category">
                <option value="traditional">Traditional</option>
                <option value="vegan">Vegan</option>
                <option value="dietary">Dietary</option>
            </select>
            <label>Cooking Instructions</label>
            <textarea id="instructions" rows="6" placeholder="Step-by-step instructions..." required></textarea>
            <button type="submit" class="btn btn-submit">Publish Recipe</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
