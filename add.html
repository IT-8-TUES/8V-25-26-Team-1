<!DOCTYPE html>
<html>
<head>
    <title>Add New Recipe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><a href="index.html">Home</a><a href="traditional.html">Traditional</a><a href="vegan.html">Vegan</a><a href="dietary.html">Dietary</a><a href="add.html">Add Recipe</a><a href="save.html">Saved</a></nav>
    <div class="container">
        <h1>Share Your Recipe</h1>
        <form id="addForm" onsubmit="handleAddRecipe(event)">
            <label>Recipe Title</label>
            <input type="text" id="title" placeholder="e.g. Grandma's Apple Pie" required>
            
            <label>Category</label>
            <select id="category">
                <option value="traditional">Traditional</option>
                <option value="vegan">Vegan</option>
                <option value="dietary">Dietary</option>
            </select>
            
            <label>Instructions</label>
            <textarea id="instructions" rows="6" placeholder="Step by step guide..." required></textarea>
            
            <button type="submit" class="btn btn-submit">Publish Recipe</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
